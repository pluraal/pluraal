name: Lint

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npm run lint

      - name: Generate reference model test reports
        run: |
          mkdir -p test-reports
          for file in specs/reference-models/*.md; do
            name=$(basename "$file" .md)
            node dist/cli.js test "$file" --reporter junit --output "test-reports/${name}.xml" || true
          done

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: test-reports
          path: test-reports/*.xml